<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 1500">
  <!-- LRT train: sleeker, narrower, with pointed nose -->
  <!-- Body with aerodynamic front taper using path -->
  <path d="
    M150,300
    L150,900
    Q150,980 230,980
    L1100,980
    Q1200,980 1300,880
    L1420,680
    Q1460,620 1420,560
    L1300,360
    Q1200,260 1100,260
    L230,260
    Q150,260 150,300 Z
  " fill="#ffffff"/>
  <!-- Windows: 2 windows using compound path cutout -->
  <path d="
    M150,300 L150,900 Q150,980 230,980 L1100,980 Q1200,980 1300,880 L1420,680 Q1460,620 1420,560 L1300,360 Q1200,260 1100,260 L230,260 Q150,260 150,300 Z
    M260,400 L260,700 Q260,740 300,740 L520,740 Q560,740 560,700 L560,400 Q560,360 520,360 L300,360 Q260,360 260,400 Z
    M620,400 L620,700 Q620,740 660,740 L840,740 Q880,740 880,700 L880,400 Q880,360 840,360 L660,360 Q620,360 620,400 Z
  " fill-rule="evenodd" fill="#ffffff"/>
  <!-- Small wheel left -->
  <circle cx="320" cy="1020" r="110" fill="#ffffff"/>
  <!-- Small wheel right -->
  <circle cx="1060" cy="1020" r="110" fill="#ffffff"/>
  <!-- Undercarriage bar -->
  <rect x="380" y="970" width="740" height="55" fill="#ffffff"/>
  <!-- Anchor pole -->
  <rect x="700" y="1130" width="100" height="260" fill="#ffffff"/>
  <polygon points="700,1390 800,1390 750,1460" fill="#ffffff"/>
</svg>
