    M160,400 L160,760 Q160,800 200,800 L440,800 Q480,800 480,760 L480,400 Q480,360 440,360 L200,360 Q160,360 160,400 Z
    M540,400 L540,760 Q540,800 580,800 L920,800 Q960,800 960,760 L960,400 Q960,360 920,360 L580,360 Q540,360 540,400 Z
    M1020,400 L1020,760 Q1020,800 1060,800 L1300,800 Q1340,800 1340,760 L1340,400 Q1340,360 1300,360 L1060,360 Q1020,360 1020,400 Z
  " fill-rule="evenodd" fill="#ffffff"/>
